services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: audio_ai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/audio-assets
      "

  api:
    build:
      context: backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/audio_ai
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: audio-assets
      BACKEND_SCHEMA_BOOTSTRAP: metadata-create-all
      ARTIFACT_ROOT: /artifacts
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/audio_ai
      REDIS_URL: redis://redis:6379/0
      BACKEND_SCHEMA_BOOTSTRAP: metadata-create-all
      ARTIFACT_ROOT: /artifacts
    volumes:
      - ./artifacts:/artifacts
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info -Q audio

  beat:
    build:
      context: backend
      dockerfile: Dockerfile
    depends_on:
      - redis
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/audio_ai
      REDIS_URL: redis://redis:6379/0
      BACKEND_SCHEMA_BOOTSTRAP: metadata-create-all
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info

  flower:
    image: mher/flower:2.0
    depends_on:
      - redis
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"

  edge-relay:
    image: nginx:alpine
    ports:
      - "8080:80"
