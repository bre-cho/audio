name: auto-incident-report

on:
  workflow_dispatch:
    inputs:
      incident_context:
        description: "Free-text incident context"
        required: false
        default: "manual-trigger"
      alertname:
        description: "Alert name if known"
        required: false
        default: ""
      severity:
        description: "Severity"
        required: false
        default: "warning"
  workflow_run:
    workflows: ["audio-chaos-ci", "audio-ci-e2e", "audio-canary-deploy"]
    types: [completed]

concurrency:
  group: auto-incident-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: true

jobs:
  incident-report:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      ALERTMANAGER_URL: ${{ secrets.ALERTMANAGER_URL }}
      PROMETHEUS_URL: ${{ secrets.PROMETHEUS_URL }}
      DOCKER_COMPOSE_BIN: docker compose
      API_SERVICE: api
      WORKER_SERVICE: worker
      FRONTEND_SERVICE: frontend
      EDGE_RELAY_SERVICE: edge-relay
      REDIS_SERVICE: redis
      POSTGRES_SERVICE: postgres
      REPORT_DIR: .incident_report
      INCIDENT_CONTEXT: ${{ github.event.inputs.incident_context || github.event.workflow_run.name || 'workflow-failure' }}
      ALERT_NAME: ${{ github.event.inputs.alertname || '' }}
      ALERT_SEVERITY: ${{ github.event.inputs.severity || 'warning' }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare incident report directory
        run: mkdir -p "$REPORT_DIR"

      - name: Collect incident evidence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/incident/collect_audio_evidence_v3.py \
            --repo "${{ github.repository }}" \
            --workflow-name "${{ github.event.workflow_run.name || github.event.inputs.incident_context }}" \
            --run-id "${{ github.event.workflow_run.id || github.run_id }}" \
            --output .incident_evidence.json

      - name: Classify audio root cause
        run: |
          python scripts/incident/classify_audio_root_cause_v3.py \
            --evidence .incident_evidence.json \
            --output .incident_classification.json

      - name: Render incident report
        run: |
          python scripts/incident/render_incident_report.py \
            --classification .incident_classification.json \
            --output incident_report.md

      - name: Collect root cause snapshot
        run: bash scripts/incident/collect_root_cause_snapshot.sh

      - name: Generate markdown incident report
        run: bash scripts/incident/generate_incident_report.sh

      - name: Upload incident artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-incident-${{ github.event.workflow_run.id || github.run_id }}
          path: |
            .incident_report/
            .incident_evidence.json
            .incident_classification.json
            incident_report.md

      - name: Build Slack payload
        if: always()
        run: python scripts/incident/build_incident_slack_payload.py > .incident_report/slack_payload.json

      - name: Slack notify
        if: always() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v2.1.1
        with:
          payload-file-path: .incident_report/slack_payload.json
