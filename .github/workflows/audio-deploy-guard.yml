name: audio-deploy-guard

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production
      deploy_ref:
        description: "Git ref to deploy"
        required: true
        default: "main"
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      deploy_ref:
        required: true
        type: string

concurrency:
  group: audio-deploy-guard-${{ inputs.environment || github.event.inputs.environment || github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.meta.outputs.env_name }}
      deploy_ref: ${{ steps.meta.outputs.deploy_ref }}
    steps:
      - id: meta
        run: |
          echo "env_name=${{ inputs.environment || github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          echo "deploy_ref=${{ inputs.deploy_ref || github.event.inputs.deploy_ref }}" >> "$GITHUB_OUTPUT"

  audio-gate:
    name: audio gate
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Validate required status checks policy
        run: |
          echo "Checking deploy preconditions for ref=${{ needs.preflight.outputs.deploy_ref }} env=${{ needs.preflight.outputs.env_name }}"
      - name: Require audio CI green by branch protection / environment policy
        run: |
          echo "This workflow expects branch protection / required checks to enforce audio-ci-e2e before promotion."
      - name: Optional explicit API gate via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/commits/${{ needs.preflight.outputs.deploy_ref }}/status >/tmp/commit_status.json || true
          cat /tmp/commit_status.json | python - <<'PY'
import json,sys
p='/tmp/commit_status.json'
try:
    data=json.load(open(p))
except Exception:
    print('WARN: commit status not available; falling back to branch protection expectations')
    sys.exit(0)
state=data.get('state')
print('commit combined state:', state)
if state == 'failure':
    print('Blocking deploy: combined commit status is failure')
    sys.exit(1)
PY

  deploy:
    name: deploy release
    runs-on: ubuntu-latest
    needs: [preflight, audio-gate]
    environment: ${{ needs.preflight.outputs.env_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.deploy_ref }}
      - name: Set revision metadata
        run: |
          echo "DEPLOY_REF=${{ needs.preflight.outputs.deploy_ref }}" >> "$GITHUB_ENV"
          echo "ENV_NAME=${{ needs.preflight.outputs.env_name }}" >> "$GITHUB_ENV"
      - name: Run guarded deploy script
        env:
          DEPLOY_ENV: ${{ needs.preflight.outputs.env_name }}
          DEPLOY_REF: ${{ needs.preflight.outputs.deploy_ref }}
          RELEASE_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          PREVIOUS_REVISION: ${{ vars.PREVIOUS_REVISION || '' }}
          CURRENT_REVISION: ${{ needs.preflight.outputs.deploy_ref }}
          DEPLOY_COMMAND: ${{ vars.DEPLOY_COMMAND || './scripts/deploy/deploy.sh' }}
          ROLLBACK_COMMAND: ${{ vars.ROLLBACK_COMMAND || './scripts/deploy/rollback.sh' }}
          AUDIO_HEALTH_URL: ${{ vars.AUDIO_HEALTH_URL || '' }}
          BASE_URL: ${{ vars.BASE_URL || '' }}
          AUTH_ENABLED: ${{ vars.AUTH_ENABLED || '0' }}
          AUTH_EMAIL: ${{ secrets.TEST_USER_EMAIL || '' }}
          AUTH_PASSWORD: ${{ secrets.TEST_USER_PASSWORD || '' }}
          SAMPLE_PATH: ${{ vars.SAMPLE_PATH || './test_sample.mp3' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || '' }}
        run: |
          chmod +x scripts/deploy/*.sh || true
          bash scripts/deploy/deploy_guard.sh
      - name: Upload deploy guard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audio-deploy-guard-${{ github.run_id }}
          path: |
            .deploy_guard/**
            .verify_audio_e2e/**
          if-no-files-found: warn

  notify-block-or-rollback:
    name: notify block or rollback
    if: failure()
    runs-on: ubuntu-latest
    needs: [preflight, audio-gate, deploy]
    steps:
      - name: Build Slack payload
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ENV_NAME: ${{ needs.preflight.outputs.env_name }}
          DEPLOY_REF: ${{ needs.preflight.outputs.deploy_ref }}
        run: |
          python - <<'PY' > slack.json
import json, os
text = {
  "text": f"Audio deploy guard failed/rolled back | env={os.getenv('ENV_NAME')} | ref={os.getenv('DEPLOY_REF')} | run={os.getenv('RUN_URL')}"
}
print(json.dumps(text))
PY
      - name: Send Slack alert
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: slack.json
