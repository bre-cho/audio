name: audio-ci-e2e

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      auth_enabled:
        description: "Enable auth for audio E2E"
        required: false
        default: "0"
      sample_path:
        description: "Path to sample audio inside repo"
        required: false
        default: "backend/data/audio/test_sample.mp3"
  pull_request:
    paths:
      - 'backend/app/api/audio.py'
      - 'backend/app/api/jobs.py'
      - 'backend/app/api/voice_clone.py'
      - 'backend/app/services/audio/**'
      - 'backend/app/services/audio_artifact_service.py'
      - 'backend/app/models/voice_*.py'
      - 'backend/app/models/narration_job.py'
      - 'backend/app/models/audio_render_output.py'
      - 'backend/app/schemas/audio.py'
      - 'backend/app/workers/*audio*'
      - 'backend/app/workers/*narration*'
      - 'backend/app/workers/*voice_clone*'
      - 'backend/app/workers/audio_tasks.py'
      - 'backend/app/workers/clone_tasks.py'
      - 'backend/app/main.py'
      - 'backend/app/core/config.py'
      - 'scripts/ci/verify_audio_*.sh'
      - 'scripts/ci/audio_fail_safe.sh'
      - 'scripts/ci/build_audio_slack_payload.py'
      - '.github/workflows/audio-ci-e2e.yml'
      - 'docker-compose.yml'
      - 'backend/**/Dockerfile*'
  push:
    branches: [main, master]
    paths:
      - 'backend/app/api/audio.py'
      - 'backend/app/api/jobs.py'
      - 'backend/app/api/voice_clone.py'
      - 'backend/app/services/audio/**'
      - 'backend/app/services/audio_artifact_service.py'
      - 'backend/app/models/voice_*.py'
      - 'backend/app/models/narration_job.py'
      - 'backend/app/models/audio_render_output.py'
      - 'backend/app/schemas/audio.py'
      - 'backend/app/workers/*audio*'
      - 'backend/app/workers/*narration*'
      - 'backend/app/workers/*voice_clone*'
      - 'backend/app/workers/audio_tasks.py'
      - 'backend/app/workers/clone_tasks.py'
      - 'backend/app/main.py'
      - 'backend/app/core/config.py'
      - 'scripts/ci/verify_audio_*.sh'
      - 'scripts/ci/audio_fail_safe.sh'
      - 'scripts/ci/build_audio_slack_payload.py'
      - '.github/workflows/audio-ci-e2e.yml'
      - 'docker-compose.yml'
      - 'backend/**/Dockerfile*'

concurrency:
  group: audio-ci-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  audio-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
      BASE_URL: http://localhost:8000
      API_SERVICE: api
      WORKER_SERVICE: worker
      DOCKER_COMPOSE_BIN: docker compose
      SKIP_STACK_UP: "1"
      AUTH_ENABLED: ${{ github.event.inputs.auth_enabled || '0' }}
      AUTH_EMAIL: ${{ secrets.AUDIO_E2E_EMAIL }}
      AUTH_PASSWORD: ${{ secrets.AUDIO_E2E_PASSWORD }}
      SAMPLE_PATH: ${{ github.event.inputs.sample_path || 'backend/data/audio/test_sample.mp3' }}
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Cache backend downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-audio-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-audio-

      - name: Prepare env files
        run: |
          cp backend/.env.example backend/.env.dev || true
          mkdir -p artifacts/audio-ci
          chmod +x scripts/ci/verify_audio_patch.sh scripts/ci/verify_audio_e2e.sh scripts/ci/audio_fail_safe.sh

      - name: Install backend dependencies for static check
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Static audio patch verify
        run: bash scripts/ci/verify_audio_patch.sh

      - name: Build and start stack
        run: |
          docker compose config
          docker compose up -d postgres redis minio minio-init api worker beat flower frontend edge-relay

      - name: Wait for stack
        run: python scripts/ci/wait_for_stack.py 300

      - name: Audio end-to-end verify
        id: audio_e2e
        run: bash scripts/ci/verify_audio_e2e.sh

      - name: Collect fail-safe artifacts
        if: always()
        run: bash scripts/ci/audio_fail_safe.sh

      - name: Build Slack payload
        if: always()
        run: |
          python scripts/ci/build_audio_slack_payload.py > artifacts/audio-ci/slack-payload.json
          cat artifacts/audio-ci/slack-payload.json

      - name: Upload audio CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audio-ci-${{ github.run_id }}
          path: |
            artifacts/audio-ci/**
            .verify_audio_patch/**
            .verify_audio_e2e/**
          if-no-files-found: warn
          retention-days: 14

      - name: Slack alert on failure or recovery
        if: always() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: artifacts/audio-ci/slack-payload.json

      - name: Tear down stack
        if: always()
        run: docker compose down -v
