name: audio-master-verify

on:
  pull_request:
    paths:
      - "backend/**"
      - "scripts/ci/**"
      - "scripts/migrations/**"
      - ".github/workflows/audio-master-verify.yml"
  workflow_dispatch:

jobs:
  master-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
      BASE_URL: http://localhost:8000
      API_SERVICE: api
      WORKER_SERVICE: worker
      ARTIFACT_ROOT: ${{ github.workspace }}/artifacts

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi
          pip install pytest
      - name: Prepare env and permissions
        run: |
          mkdir -p artifacts/audio-ci
          chmod +x scripts/ci/verify_audio_patch.sh scripts/ci/verify_audio_e2e.sh scripts/ci/audio_fail_safe.sh
      - name: Static verify scripts
        run: |
          bash -n scripts/ci/verify_audio_patch.sh
          bash -n scripts/ci/verify_audio_e2e.sh
      - name: Compile backend
        run: |
          python -m compileall backend/app
          python -m compileall scripts
      - name: Verify audio patch without runtime
        run: |
          VERIFY_RUNTIME=0 SKIP_STACK_UP=1 bash scripts/ci/verify_audio_patch.sh
      - name: Bring up audio stack
        run: |
          docker compose config
          docker compose up -d postgres redis api worker
      - name: Wait for stack
        run: |
          python scripts/ci/wait_for_stack.py 300
      - name: Migrate audio factory schema
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/audio_ai
          PYTHONPATH: backend
        run: |
          python scripts/migrations/audio_factory_schema.py
      - name: Schema guard
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/audio_ai
          PYTHONPATH: backend
        run: |
          python scripts/ci/audio_schema_guard.py
      - name: Verify audio patch with runtime
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/audio_ai
          PYTHONPATH: backend
        run: |
          SKIP_STACK_UP=1 VERIFY_RUNTIME=1 bash scripts/ci/verify_audio_patch.sh
      - name: E2E conversation
        env:
          REPORT_DIR: .audio_factory_report
        run: |
          python scripts/ci/e2e_conversation.py
      - name: Seed clone preview voice
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/audio_ai
          PYTHONPATH: backend
          E2E_CLONE_PREVIEW_VOICE_ID: 00000000-0000-0000-0000-000000000123
        run: |
          python scripts/ci/seed_clone_preview_voice.py
      - name: E2E clone preview
        env:
          REPORT_DIR: .audio_factory_report
        run: |
          python scripts/ci/e2e_clone_preview.py
      - name: Artifact checksum verify
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/audio_ai
          PYTHONPATH: backend
        run: |
          python scripts/ci/artifact_checksum_verify.py
      - name: Merge factory report
        if: always()
        env:
          REPORT_DIR: .audio_factory_report
        run: |
          python scripts/ci/factory_report_merge.py
      - name: Audio end-to-end verify
        id: audio_e2e
        env:
          SKIP_STACK_UP: "1"
        run: bash scripts/ci/verify_audio_e2e.sh
      - name: Collect fail-safe artifacts
        if: always()
        run: bash scripts/ci/audio_fail_safe.sh
      - name: Tear down stack
        if: always()
        run: docker compose down -v
      - name: Upload verify report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audio-master-verify-report
          path: |
            .verify_audio_patch/report.txt
            .verify_audio_e2e/report.txt
            artifacts/audio-ci/**
            .audio_factory_report/*.json
          if-no-files-found: ignore
